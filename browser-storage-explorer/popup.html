<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Storage Explorer</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo">
        <img src="assets/icons/icon48.png" alt="Logo">
        <span>Storage Explorer</span>
      </div>
      <button id="options-btn" title="Options" class="icon-btn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <div class="site-info">
      <span class="label">Current Site</span>
      <span id="site-url" class="value">Loading active site...</span>
    </div>

    <div class="stats-grid">
      <!-- Local Storage -->
      <div class="stat-card" data-target="localStorage">
        <div class="card-header">
          <span class="icon">📦</span>
          <span class="title">Local Storage</span>
        </div>
        <div class="card-body">
          <div class="main-val" id="local-count">-</div>
          <div class="sub-val" id="local-size">- KB</div>
        </div>
      </div>

      <!-- Session Storage -->
      <div class="stat-card" data-target="sessionStorage">
        <div class="card-header">
          <span class="icon">🧠</span>
          <span class="title">Session Storage</span>
        </div>
        <div class="card-body">
          <div class="main-val" id="session-count">-</div>
          <div class="sub-val" id="session-size">- KB</div>
        </div>
      </div>

      <!-- Cookies -->
      <div class="stat-card" data-target="cookies">
        <div class="card-header">
          <span class="icon">🍪</span>
          <span class="title">Cookies</span>
        </div>
        <div class="card-body">
          <div class="main-val" id="cookies-count">-</div>
          <div class="sub-val" id="cookies-domain">Active Domain</div>
        </div>
      </div>
    </div>

    <div class="actions-wrapper">
      <button id="open-dashboard-btn" class="primary-btn">
        <span>Open Full Dashboard</span>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
